spring:
  application:
    name: sai-assistant-rag-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

debug: false

logging:
  level:
    org.springframework: INFO
    reactor.netty: INFO

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

assistant:
  admin-secret: ${ASSISTANT_ADMIN_SECRET:}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,https://saikumarmediboina.com}
  max-question-length: 700
  top-k: 5
  chunk-size-chars: 2200
  chunk-overlap-chars: 220
  seed-urls:
    - https://saikumarmediboina.com/
    - https://saikumarmediboina.com/about
    - https://saikumarmediboina.com/portfolio
    - https://saikumarmediboina.com/blogs
    - https://saikumarmediboina.com/active-builds/sai-assistant
  rate-limit:
    capacity: 20
    refill-per-minute: 12
  oracle:
    jdbc-url: ${ORACLE_JDBC_URL:}
    username: ${ORACLE_USERNAME:}
    password: ${ORACLE_PASSWORD:}
  llm:
    provider: ${LLM_PROVIDER:local}
    openai-api-key: ${OPENAI_API_KEY:}
    gemini-api-key: ${GEMINI_API_KEY:}
  embeddings:
    provider: ${EMBEDDING_PROVIDER:local}
    dimension: ${EMBEDDING_DIMENSION:64}
